name: Desktop Build

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify-release-metadata:
    name: Verify release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" || ! "${GITHUB_REF_NAME:-}" =~ ^v.+$ ]]; then
            echo "Release tags must start with v." >&2
            exit 1
          fi

          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version metadata for tagged releases
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const releaseVersion = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoMatch = cargoToml.match(/^version = "([^"]+)"/m);

          if (!cargoMatch) {
            throw new Error('Could not read version from src-tauri/Cargo.toml');
          }

          const versions = {
            'package.json': packageJson.version,
            'src-tauri/tauri.conf.json': tauriConf.version,
            'src-tauri/Cargo.toml': cargoMatch[1],
          };

          for (const [file, value] of Object.entries(versions)) {
            if (value !== releaseVersion) {
              throw new Error(`${file} version ${value} does not match tag version ${releaseVersion}`);
            }
          }

          if (tauriConf.productName !== 'PIAR Digital') {
            throw new Error(`src-tauri/tauri.conf.json productName must stay "PIAR Digital", got ${tauriConf.productName}`);
          }
          NODE

  build-windows-store:
    name: Build Windows store bundle
    runs-on: windows-latest
    needs: verify-release-metadata
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Microsoft Store Windows MSIX package
        env:
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER_DISPLAY_NAME: ${{ vars.MSIX_PUBLISHER_DISPLAY_NAME }}
          MSIX_DISPLAY_NAME: ${{ vars.MSIX_DISPLAY_NAME }}
        run: npm run desktop:build:store

      - name: Upload Windows Store MSIX package
        id: upload-store
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-store
          path: src-tauri/target/release/bundle/msix/**/*.msix
          if-no-files-found: error
          retention-days: 7

  attach-release-assets:
    name: Attach desktop assets to GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs:
      - build-windows-store
    permissions:
      contents: write
    steps:
      - name: Download Windows store bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-store
          path: release-assets/windows-store

      - name: Attach desktop assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/windows-store/**/*

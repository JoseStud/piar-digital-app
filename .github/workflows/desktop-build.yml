name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  verify-signpath-constraints:
    name: Verify SignPath constraints
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.release.outputs.version }}
    steps:
      - name: Reject workflow reruns
        if: ${{ github.run_attempt != 1 }}
        run: |
          echo "SignPath-protected desktop builds must run from a fresh workflow execution."
          echo "Create a new run instead of re-running this workflow."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Derive release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "version=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! "${GITHUB_REF_NAME}" =~ ^v.+$ ]]; then
            echo "Release tags must start with v." >&2
            exit 1
          fi

          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version metadata for tagged releases
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const releaseVersion = process.env.RELEASE_VERSION;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauriConf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargoToml = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoMatch = cargoToml.match(/^version = "([^"]+)"/m);

          if (!cargoMatch) {
            throw new Error('Could not read version from src-tauri/Cargo.toml');
          }

          const versions = {
            'package.json': packageJson.version,
            'src-tauri/tauri.conf.json': tauriConf.version,
            'src-tauri/Cargo.toml': cargoMatch[1],
          };

          for (const [file, value] of Object.entries(versions)) {
            if (value !== releaseVersion) {
              throw new Error(`${file} version ${value} does not match tag version ${releaseVersion}`);
            }
          }

          if (tauriConf.productName !== 'PIAR Digital') {
            throw new Error(`src-tauri/tauri.conf.json productName must stay "PIAR Digital", got ${tauriConf.productName}`);
          }
          NODE

  build-windows-unsigned:
    name: Build Windows unsigned bundle
    runs-on: windows-latest
    needs: verify-signpath-constraints
    outputs:
      unsigned-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows bundle
        run: npm run desktop:build

      - name: Upload unsigned Windows bundle
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-unsigned
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 7

  sign-windows:
    name: Sign Windows bundle
    runs-on: ubuntu-latest
    needs:
      - verify-signpath-constraints
      - build-windows-unsigned
    environment: PIAR
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
    steps:
      - name: Validate SignPath configuration
        shell: bash
        run: |
          set -euo pipefail

          required_secret_names=(
            SIGNPATH_API_TOKEN
            SIGNPATH_ORGANIZATION_ID
            SIGNPATH_PROJECT_SLUG
            SIGNPATH_SIGNING_POLICY_SLUG
          )

          for name in "${required_secret_names[@]}"; do
            value="${!name:-}"
            if [[ -z "$value" ]]; then
              echo "Missing required SignPath configuration: $name" >&2
              exit 1
            fi
          done

      - name: Submit Windows bundle to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ needs.build-windows-unsigned.outputs.unsigned-artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed/windows
          parameters: |
            version:${{ github.ref_type == 'tag' && needs.verify-signpath-constraints.outputs.release-version || github.sha }}

      - name: Upload signed Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-signed
          path: signed/windows/**
          if-no-files-found: error
          retention-days: 7

  attach-release-assets:
    name: Attach desktop assets to GitHub release
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs:
      - sign-windows
    permissions:
      contents: write
    steps:
      - name: Download signed Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-signed
          path: release-assets/windows

      - name: Attach desktop assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/windows/**/*

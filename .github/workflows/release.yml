name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    environment: PIAR
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_CONTACT_EMAIL: ${{ secrets.NEXT_PUBLIC_CONTACT_EMAIL }}
    steps:
      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: PIAR Digital ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: |
            Deployment metadata

            - Public site: ${{ env.NEXT_PUBLIC_SITE_URL }}
            - Support: ${{ env.NEXT_PUBLIC_CONTACT_EMAIL }}
            - Docker image: ghcr.io/${{ github.repository }}:${{ env.RELEASE_TAG }}

            Windows release output

            - Desktop assets attached to this release are Microsoft Store-oriented Windows MSIX packages built from the source in this repository.
            - The Store package is generated from the Tauri Windows build output using `scripts/build-msix.mjs`.
            - Additional code signing and Microsoft Store submission steps remain operator-managed.
            - Base branch release policy: [docs/code-signing-policy.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/code-signing-policy.md)
            - SignPath-specific controls live on the `signpath-compliance` branch.

            Privacy policy

            - PIAR form contents stay local to the browser or desktop runtime.
            - The app does not send PIAR form data to third-party services.
            - The deployed app may fetch same-origin static assets and, when configured by the deployment, a same-origin DOCX template URL.
            - Details: [docs/security.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/security.md)

            Desktop installers, when produced by the desktop workflow, are attached to this release.

name: Feature request
description: Suggest a new feature or improvement
title: "[feature] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that prompted this idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the app behave differently?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
  - type: textarea
    id: beneficiaries
    attributes:
      label: Who benefits?
      description: Docentes, equipo de apoyo, IT institucional, evaluadores, others?
    validations:
      required: true
  - type: input
    id: decreto-ref
    attributes:
      label: Related Decreto/Anexo reference (optional)
      placeholder: e.g. Decreto 1421 de 2017, Anexo 2, seccion X
